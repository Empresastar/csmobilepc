<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>JS-GO: ARENA PC</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Press Start 2P', cursive; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0f0; z-index: 5; pointer-events: none; }
        #health-bar { width: 200px; height: 15px; border: 2px solid #0f0; background: #002200; margin-top: 5px; }
        #health-val { width: 100%; height: 100%; background: #0f0; transition: 0.2s; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid #0f0; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; display: none; }
        #crosshair::before { content: ''; position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #0f0; border-radius: 50%; transform: translate(-50%, -50%); }
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .btn { padding: 15px 30px; cursor: pointer; background: #0f0; border: none; margin: 10px; font-family: 'Press Start 2P'; }
        #btn-exit { position: absolute; top: 20px; right: 20px; padding: 10px; background: #aa0000; color: white; border: 2px solid red; cursor: pointer; display: none; font-family: 'Press Start 2P'; font-size: 10px; }
    </style>
</head>
<body onclick="if(document.getElementById('menu').style.display==='none') document.body.requestPointerLock()">
    <div id="ui">
        HP: <div id="health-bar"><div id="health-val"></div></div>
        <div id="score" style="margin-top:10px">KILLS: 0</div>
    </div>
    <div id="crosshair"></div>
    <button id="btn-exit" onclick="location.reload()">SAIR DA SALA</button>

    <div id="menu">
        <h1>JS-GO ARENA</h1>
        <button class="btn" onclick="createRoom()">GERAR ID DA SALA</button>
        <input type="text" id="joinId" placeholder="COLE O ID AQUI" style="padding:12px; margin:10px; width:300px; text-align:center;">
        <button class="btn" style="background:#00ffcc" onclick="joinRoom()">ENTRAR</button>
        <p id="status" style="font-size:10px">Aguardando PeerJS...</p>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        scene.add(new THREE.GridHelper(100, 50, 0x00ff00, 0x222222));

        const player = new THREE.Group();
        player.add(camera);
        scene.add(player);
        player.position.set(0, 1.6, 10);

        const gun = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.4), new THREE.MeshStandardMaterial({color: 0x333333}));
        gun.position.set(0.3, -0.25, -0.5);
        camera.add(gun);

        const enemy = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.8, 0.4), new THREE.MeshStandardMaterial({color: 0xff0000}));
        enemy.visible = false;
        scene.add(enemy);

        let hp = 100, kills = 0, conn, isDead = false;
        const peer = new Peer();
        const keys = {};

        window.createRoom = () => { window.prompt("Seu ID de Sala:", peer.id); };
        window.joinRoom = () => { conn = peer.connect(document.getElementById('joinId').value); setupConn(); };
        peer.on('connection', c => { conn = c; setupConn(); });

        function setupConn() {
            conn.on('open', () => {
                document.getElementById('menu').style.display = 'none';
                document.getElementById('crosshair').style.display = 'block';
                document.getElementById('btn-exit').style.display = 'block';
                enemy.visible = true;
            });
            conn.on('data', data => {
                if(data.type === 'move') enemy.position.set(data.x, data.y, data.z);
                if(data.type === 'hit') {
                    hp -= 20;
                    document.getElementById('health-val').style.width = hp + "%";
                    if(hp <= 0 && !isDead) handleDeath();
                }
                if(data.type === 'score') { kills++; document.getElementById('score').innerText = "KILLS: " + kills; }
            });
        }

        function handleDeath() {
            isDead = true;
            conn.send({type: 'score'});
            player.position.set(Math.random()*40-20, 1.6, Math.random()*40-20);
            setTimeout(() => { hp = 100; document.getElementById('health-val').style.width = "100%"; isDead = false; }, 1000);
        }

        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;
        document.onmousemove = e => {
            if(document.pointerLockElement) {
                player.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
            }
        };

        document.onmousedown = () => {
            if(!document.pointerLockElement || isDead) return;
            gun.position.z = -0.3;
            const ray = new THREE.Raycaster();
            ray.setFromCamera({x:0, y:0}, camera);
            if(ray.intersectObject(enemy).length > 0) conn.send({type: 'hit'});
        };

        function animate() {
            requestAnimationFrame(animate);
            if(document.pointerLockElement && !isDead) {
                const s = 0.15;
                if(keys.KeyW) player.translateZ(-s);
                if(keys.KeyS) player.translateZ(s);
                if(keys.KeyA) player.translateX(-s);
                if(keys.KeyD) player.translateX(s);
            }
            if(conn?.open) conn.send({type:'move', x:player.position.x, y:player.position.y, z:player.position.z});
            gun.position.z += (-0.5 - gun.position.z) * 0.1;
            renderer.render(scene, camera);
        }
        peer.on('open', () => document.getElementById('status').innerText = "PeerJS Online!");
        animate();
    </script>
</body>
</html>

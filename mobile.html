<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JS-GO MOBILE</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Press Start 2P', cursive; touch-action: none; }
        
        #ui { position: absolute; top: 15px; left: 15px; color: #0f0; z-index: 10; font-size: 8px; pointer-events: none; }
        #health-bar { width: 140px; height: 12px; border: 2px solid #0f0; background: #002200; margin-top: 5px; }
        #health-val { width: 100%; height: 100%; background: #0f0; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid #0f0; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 20; display: none; }
        #crosshair::after { content: ''; position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #0f0; border-radius: 50%; transform: translate(-50%, -50%); }

        /* Controles */
        #joy-con { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border: 1px solid #0f0; border-radius: 50%; z-index: 50; }
        #joy-stick { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: #0f0; border-radius: 50%; }
        #btn-fire { position: absolute; bottom: 40px; right: 40px; width: 85px; height: 85px; background: rgba(255,0,0,0.5); border: 4px solid #f00; border-radius: 50%; z-index: 50; display: none; font-family: 'Press Start 2P'; color: white; }
        #btn-exit { position: absolute; top: 15px; right: 15px; padding: 10px; background: #aa0000; color: white; border: 1px solid red; font-size: 8px; display: none; z-index: 60; font-family: 'Press Start 2P'; }

        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .btn { padding: 15px; background: #0f0; border: none; margin: 10px; width: 80%; font-family: 'Press Start 2P'; }
    </style>
</head>
<body>
    <div id="ui">
        HP: <div id="health-bar"><div id="health-val"></div></div>
        <div id="score" style="margin-top:8px">KILLS: 0</div>
    </div>
    <div id="crosshair"></div>
    <button id="btn-exit" onclick="location.reload()">SAIR</button>
    <div id="joy-con"><div id="joy-stick"></div></div>
    <button id="btn-fire">FOGO</button>
    
    <div id="menu">
        <h2>JS-GO MOBILE</h2>
        <button class="btn" onclick="createRoom()">1. GERAR SALA</button>
        <input type="text" id="joinId" style="padding:12px; margin:10px; width:70%; text-align:center;" placeholder="ID DO AMIGO">
        <button class="btn" style="background:#00ffcc" onclick="joinRoom()">2. ENTRAR</button>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        scene.add(new THREE.GridHelper(100, 40, 0x00ff00, 0x222222));

        const player = new THREE.Group();
        player.add(camera);
        scene.add(player);
        player.position.set(0, 1.6, 5);

        const gun = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.4), new THREE.MeshStandardMaterial({color: 0x222222}));
        gun.position.set(0.25, -0.2, -0.5); 
        camera.add(gun);

        const enemy = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.8, 0.4), new THREE.MeshStandardMaterial({color: 0xff0000}));
        enemy.visible = false;
        scene.add(enemy);

        let moveDir = {x:0, z:0}, lookTouchId = null, lastLookX, lastLookY, conn, hp = 100, kills = 0, isDead = false;
        const stick = document.getElementById('joy-stick');
        const peer = new Peer();

        // --- SISTEMA DE CÂMERA MOBILE ---
        window.addEventListener('touchstart', e => {
            for(let t of e.changedTouches) {
                if(t.clientX > window.innerWidth / 2 && lookTouchId === null) {
                    lookTouchId = t.identifier;
                    lastLookX = t.clientX;
                    lastLookY = t.clientY;
                }
            }
        });
        window.addEventListener('touchmove', e => {
            for(let t of e.changedTouches) {
                if(t.identifier === lookTouchId) {
                    const dx = t.clientX - lastLookX;
                    const dy = t.clientY - lastLookY;
                    player.rotation.y -= dx * 0.006;
                    camera.rotation.x -= dy * 0.006;
                    camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
                    lastLookX = t.clientX;
                    lastLookY = t.clientY;
                }
            }
        });
        window.addEventListener('touchend', e => {
            for(let t of e.changedTouches) if(t.identifier === lookTouchId) lookTouchId = null;
        });

        // Joystick
        document.getElementById('joy-con').addEventListener('touchmove', e => {
            e.stopPropagation();
            const rect = e.currentTarget.getBoundingClientRect();
            const dx = e.touches[0].clientX - (rect.left + 50);
            const dy = e.touches[0].clientY - (rect.top + 50);
            const dist = Math.min(Math.sqrt(dx*dx+dy*dy), 40);
            const angle = Math.atan2(dy, dx);
            stick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            moveDir = {x: Math.cos(angle)*(dist/40), z: Math.sin(angle)*(dist/40)};
        });
        document.getElementById('joy-con').addEventListener('touchend', () => {
            stick.style.transform = `translate(0,0)`;
            moveDir = {x:0, z:0};
        });

        window.createRoom = () => window.prompt("Seu ID:", peer.id);
        window.joinRoom = () => { conn = peer.connect(document.getElementById('joinId').value); setupConn(); };
        peer.on('connection', c => { conn = c; setupConn(); });

        function setupConn() {
            conn.on('open', () => { 
                document.getElementById('menu').style.display='none'; 
                document.getElementById('btn-fire').style.display='block';
                document.getElementById('btn-exit').style.display='block';
                document.getElementById('crosshair').style.display='block';
                enemy.visible = true; 
            });
            conn.on('data', data => {
                if(data.type==='move') enemy.position.set(data.x, data.y, data.z);
                if(data.type==='hit') {
                    hp -= 20;
                    document.getElementById('health-val').style.width = hp + "%";
                    if(hp <= 0 && !isDead) handleDeath();
                }
                if(data.type==='score') { kills++; document.getElementById('score').innerText = "KILLS: " + kills; }
            });
        }

        function handleDeath() {
            isDead = true;
            conn.send({type: 'score'});
            player.position.set(Math.random()*30-15, 1.6, Math.random()*30-15);
            setTimeout(() => { hp = 100; document.getElementById('health-val').style.width = "100%"; isDead = false; }, 1000);
        }

        document.getElementById('btn-fire').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(isDead || !conn) return;
            gun.position.z = -0.25;
            const ray = new THREE.Raycaster();
            ray.setFromCamera({x:0, y:0}, camera);
            if(ray.intersectObject(enemy).length > 0) conn.send({type:'hit'});
        });

        function animate() {
            requestAnimationFrame(animate);
            if(!isDead) {
                player.translateX(moveDir.x * 0.12);
                player.translateZ(moveDir.z * 0.12);
            }
            gun.position.z += (-0.5 - gun.position.z) * 0.1;
            if(conn?.open) conn.send({type:'move', x:player.position.x, y:player.position.y, z:player.position.z});
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>

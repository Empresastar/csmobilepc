<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS-GO: Escolha sua Plataforma</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body { 
            margin: 0; 
            padding: 0; 
            background: #050505; 
            color: #0f0; 
            font-family: 'Press Start 2P', cursive; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            text-align: center;
        }

        h1 { font-size: 24px; margin-bottom: 50px; text-shadow: 4px 4px #004400; }

        .container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }

        .card {
            border: 3px solid #0f0;
            padding: 30px;
            width: 250px;
            cursor: pointer;
            transition: 0.3s;
            background: #001100;
        }

        .card:hover {
            background: #0f0;
            color: #000;
            transform: scale(1.1);
        }

        .card i { font-size: 40px; display: block; margin-bottom: 20px; }
        
        p { font-size: 10px; margin-top: 20px; color: #888; }
    </style>
</head>
<body>

    <h1>JS-GO ARENA</h1>
    
    <div class="container">
        <div class="card" onclick="window.location.href='pc.html'">
            <div>💻</div>
            <h2>JOGAR NO PC</h2>
            <span style="font-size: 8px;">Mouse e Teclado</span>
        </div>

        <div class="card" onclick="window.location.href='mobile.html'">
            <div>📱</div>
            <h2>JOGAR NO MOBILE</h2>
            <span style="font-size: 8px;">Touch e Joystick</span>
        </div>
    </div>

    <p>Recomendado: Use tela deitada no Celular</p>

</body>
</html>
